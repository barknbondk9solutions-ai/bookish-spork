<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <div id="banner-container"></div>
  <title>BarkNBondK9Solutions,LLC</title>

  <!-- Fonts & icons -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.min.css">
</head>
<body>

<div class="paws" aria-hidden="true"></div>

<header class="hero" role="banner">
    <div class="brand">
      <div class="logo">
        <img src="https://assets.zyrosite.com/cdn-cgi/image/format=auto,w=375,fit=crop,q=95/YrDqlxeZ4JTQb14e/logo-clear-m5KMx0qLg1sRj6X7.png" alt="Logo" width="80">
      </div>
      <div>
        <h1>Progress Portal</h1>
      <p>Track your pup’s training — milestones, progress & gallery</p>
    </div>
  </div>

<div id="milestoneModal" class="modal">
  <div class="modal-content">
    <span id="closeModal">&times;</span>
    <h2 id="modalTitle"></h2>
    <div id="modalNotes"></div>
  </div>
</div>

  <div class="hero-controls">
    <div class="search" role="search">
      <i class="fa fa-magnifying-glass" style="color:var(--navy)"></i>
      <input id="searchInput" placeholder="Search by K9 code..." aria-label="Search dog" />
    </div>
  </div>
</header>

<main class="app" role="main">
  
  <section class="carousel-wrap" aria-label="Dog carousel">
    <div class="carousel" id="carousel" tabindex="0" aria-live="polite"></div>
    <div class="controls" id="carouselDots" aria-hidden="true"></div>
  </section>

  <section class="gallery" id="gallery" aria-label="Dog gallery"></section>
</main>

<script src="script.obf.js"></script>
</body>
</html>
